<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Técnico — VSCode, Markdown, Git &amp; Ciberseguridad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EEF1F4;
    --paper-line: #C6D2DE;
    --ink: #16233A;
    --ink-soft: #45566E;
    --blue: #2B6CB0;
    --blue-deep: #163A5C;
    --rust: #B3401C;
    --rust-bg: #FBEDE7;
    --panel: #FFFFFF;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --cond: 'IBM Plex Sans Condensed', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--paper-line) 1px, transparent 1px);
    background-size: 28px 28px;
    color:var(--ink);
    font-family:var(--sans);
    font-size:18px;
    line-height:1.62;
    overflow:hidden;
  }
  a{color:var(--blue);}
  code{font-family:var(--mono);}

  /* ================= APP SHELL ================= */
  .app{
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    gap:18px;
    padding:10px 18px;
    border-bottom:1px solid var(--paper-line);
    flex:none;
    background:var(--paper);
  }
  .topbar-doc{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--ink-soft);
    line-height:1.3;
    flex:none;
    white-space:nowrap;
  }
  .topbar-doc b{color:var(--ink); display:block; font-size:11.5px;}

  .chapters{
    display:flex;
    gap:6px;
    overflow-x:auto;
    flex:1;
    scrollbar-width:none;
    padding:2px 0;
  }
  .chapters::-webkit-scrollbar{display:none;}
  .chip{
    font-family:var(--mono); font-size:10.5px; white-space:nowrap;
    color:var(--ink-soft); background:var(--panel);
    border:1px solid var(--paper-line); border-radius:20px;
    padding:6px 13px; cursor:pointer; transition:all .15s; flex:none;
    display:flex; align-items:center; gap:6px;
  }
  .chip .num{color:var(--blue); font-weight:600;}
  .chip:hover{border-color:var(--blue); color:var(--blue);}
  .chip.active{background:var(--blue-deep); border-color:var(--blue-deep); color:#fff;}
  .chip.active .num{color:#9CC3EA;}

  .topbar-right{
    display:flex; align-items:center; gap:10px; flex:none;
  }
  .counter{
    font-family:var(--mono); font-size:12px; color:var(--ink-soft); white-space:nowrap;
  }
  .counter b{color:var(--ink);}
  .iconbtn{
    font-family:var(--mono); font-size:11px; color:var(--ink-soft);
    background:var(--panel); border:1px solid var(--paper-line); border-radius:2px;
    padding:6px 10px; cursor:pointer; white-space:nowrap;
  }
  .iconbtn:hover{border-color:var(--blue); color:var(--blue);}

  /* ---------- stage ---------- */
  .stage{
    flex:1;
    position:relative;
    display:flex;
    min-height:0;
  }
  .arrow{
    flex:none; width:60px;
    border:none; background:transparent; cursor:pointer;
    font-family:var(--mono); font-size:22px; color:#B9C6D4;
    transition:color .15s, background .15s;
    z-index:3;
  }
  .arrow:hover{ color:var(--blue); background:rgba(43,108,176,.06); }
  .arrow:disabled{opacity:.25; cursor:default; background:transparent; color:#B9C6D4;}

  .slide-viewport{
    flex:1; position:relative; overflow:hidden;
  }
  .clickzone{ display:none; }

  .slide{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    padding:8px clamp(24px, 6vw, 90px) 8px clamp(24px, 6vw, 90px);
    animation: slideIn .3s ease;
  }
  @keyframes slideIn{ from{opacity:0; transform:translateX(10px);} to{opacity:1; transform:translateX(0);} }

  .slide-inner{
    max-width:1240px; width:100%; margin:0 auto;
    height:100%;
    display:flex; flex-direction:column;
    min-height:0;
  }
  .slide-head{
    display:flex; align-items:flex-end; gap:18px;
    padding:26px 0 18px 0;
    flex:none;
    border-bottom:1px solid var(--paper-line);
  }
  .slide-num{
    font-family:var(--mono); font-size:15px; color:var(--blue);
    border:1px solid var(--blue); border-radius:2px; padding:4px 11px; flex:none;
  }
  .slide-chapter{
    font-family:var(--mono); font-size:12px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--ink-soft); margin-bottom:3px;
  }
  .slide-title{ font-family:var(--cond); font-weight:700; font-size:clamp(26px, 3vw, 36px); margin:0; color:var(--ink); }

  .slide-body{
    flex:1; min-height:0; overflow-y:auto;
    padding:26px 4px 34px 4px;
    font-size:1.08em;
  }
  .slide-body::-webkit-scrollbar{width:6px;}
  .slide-body::-webkit-scrollbar-thumb{background:var(--paper-line); border-radius:3px;}

  .lede{ color:var(--ink-soft); font-size:1.15em; margin:0 0 20px 0; }

  h3.sub{
    font-family:var(--cond); font-weight:700; font-size:1.3em; color:var(--blue-deep);
    margin:26px 0 10px 0; padding-left:12px; border-left:3px solid var(--blue);
  }
  h3.sub:first-child{margin-top:0;}
  h4.sub2{ font-family:var(--sans); font-weight:600; font-size:1.1em; margin:20px 0 8px 0; }

  ol.steps{ list-style:none; counter-reset:step; padding:0; margin:0 0 18px 0; }
  ol.steps li{
    counter-increment:step; position:relative; padding:8px 0 8px 44px; font-size:1.08em;
  }
  ol.steps li::before{
    content:counter(step); position:absolute; left:0; top:8px;
    font-family:var(--mono); font-size:13px; color:#fff; background:var(--blue-deep);
    width:26px; height:26px; border-radius:2px; display:flex; align-items:center; justify-content:center;
  }
  ul.list{ margin:0 0 18px 0; padding:0; list-style:none; }
  ul.list li{ position:relative; padding:6px 0 6px 24px; font-size:1.08em; }
  ul.list li::before{ content:"—"; position:absolute; left:0; color:var(--blue); font-family:var(--mono); }
  ul.list.risk li::before{content:"×"; color:var(--rust); font-weight:700;}

  pre.code{
    background:var(--blue-deep); color:#DCE7F2; font-family:var(--mono); font-size:0.85em;
    line-height:1.65; border-radius:4px; overflow-x:auto; margin:14px 0 20px 0;
  }
  pre.code .bar{ display:flex; align-items:center; gap:6px; padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.12); }
  pre.code .bar span{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.25); }
  pre.code .copy-btn{
    margin-left:auto; font-family:var(--mono); font-size:11px; color:#B9D3EA;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2);
    border-radius:3px; padding:3px 10px; cursor:pointer; transition:background .15s, color .15s;
  }
  pre.code .copy-btn:hover{ background:rgba(255,255,255,.18); color:#fff; }
  pre.code .copy-btn.copied{ background:var(--blue); border-color:var(--blue); color:#fff; }
  pre.code code{ display:block; padding:14px 18px; white-space:pre-wrap; }

  .box{
    border:1px solid var(--paper-line); background:var(--panel); border-left:4px solid var(--blue);
    padding:16px 22px; margin:18px 0; border-radius:2px;
  }
  .box .tag{ font-family:var(--mono); font-size:.72em; letter-spacing:.08em; color:var(--blue); margin-bottom:7px; text-transform:uppercase; }
  .box p{ margin:0; font-size:1em; }
  .box.warn{ border-left-color:var(--rust); background:var(--rust-bg); }
  .box.warn .tag{ color:var(--rust); }
  .box.warn .tag::before{content:"⚠ ";}

  .checklist{ border:1px solid var(--ink); padding:4px 0; }
  .checklist label{
    display:flex; align-items:flex-start; gap:14px; padding:13px 22px; font-size:1.05em;
    border-bottom:1px dashed var(--paper-line); cursor:pointer;
  }
  .checklist label:last-child{border-bottom:none;}
  .checklist input{
    appearance:none; width:19px; height:19px; border:1.5px solid var(--ink); margin-top:2px;
    flex:none; border-radius:2px; position:relative; cursor:pointer;
  }
  .checklist input:checked{background:var(--blue); border-color:var(--blue);}
  .checklist input:checked::after{
    content:""; position:absolute; left:5px; top:1px; width:6px; height:10px;
    border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);
  }
  .checklist span.txt{transition:color .15s;}
  .checklist input:checked ~ span.txt{color:#8494A8; text-decoration:line-through;}

  /* ---------- cover slide ---------- */
  .cover{ display:flex; flex-direction:column; justify-content:center; height:100%; gap:26px; }
  .cover .eyebrow{
    font-family:var(--mono); font-size:14px; letter-spacing:.14em; color:var(--blue);
    display:flex; align-items:center; gap:10px;
  }
  .cover .eyebrow::before{content:"§";}
  .cover .eyebrow .rule{flex:1;height:1px;background:var(--paper-line);}
  .cover h1{
    font-family:var(--cond); font-weight:700; font-size:clamp(32px,5vw,58px); line-height:1.08;
    margin:0; color:var(--ink); max-width:1000px;
  }
  .cover .subtitle{ font-size:1.15em; color:var(--ink-soft); max-width:780px; margin:0; }
  .titleblock{
    display:grid; grid-template-columns:repeat(4,1fr); border:1px solid var(--ink);
    font-family:var(--mono); font-size:13px; max-width:940px;
  }
  .titleblock div{padding:11px 16px;border-right:1px solid var(--ink);}
  .titleblock div:last-child{border-right:none;}
  .titleblock span{display:block;color:var(--ink-soft);font-size:10.5px;letter-spacing:.08em;margin-bottom:4px;}
  .titleblock strong{color:var(--ink);font-weight:600;}
  .schematic svg{ width:100%; max-width:940px; height:auto; display:block; }

  /* ---------- glossary term slide ---------- */
  .term-slide{ display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; }
  .deck-cat{ font-family:var(--mono); font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--blue); margin-bottom:16px; }
  .deck-term{ font-family:var(--mono); font-weight:600; font-size:clamp(30px,4.4vw,46px); color:var(--blue-deep); margin:0 0 10px 0; }
  .deck-cmd{ display:inline-block; font-family:var(--mono); font-size:15px; background:var(--blue-deep); color:#fff; padding:4px 14px; border-radius:2px; margin-bottom:20px; }
  .deck-def{ font-size:1.3em; color:var(--ink); max-width:760px; margin:0 auto 18px auto; }
  .deck-ex{ font-family:var(--mono); font-size:14px; color:var(--ink-soft); background:var(--paper); border-left:2px solid var(--blue); padding:9px 16px; display:inline-block; text-align:left; }

  /* ---------- bottom bar ---------- */
  .bottombar{ flex:none; border-top:1px solid var(--paper-line); background:var(--paper); }
  .progress-track{ height:3px; background:var(--paper-line); position:relative; }
  .progress-fill{ height:100%; background:var(--blue); transition:width .25s ease; }
  .progress-ticks{ position:absolute; inset:0; display:flex; }
  .progress-ticks i{ flex:none; width:1px; background:var(--paper); height:100%; }
  .hintbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 18px; font-family:var(--mono); font-size:10px; color:#8494A8;
  }

  /* ---------- overview grid ---------- */
  .overview{
    position:fixed; inset:0; background:rgba(22,35,58,.92); z-index:50;
    display:none; padding:40px; overflow-y:auto;
  }
  .overview.open{display:block;}
  .overview-head{
    display:flex; justify-content:space-between; align-items:center;
    max-width:1200px; margin:0 auto 20px auto; color:#fff; font-family:var(--mono); font-size:13px;
  }
  .overview-close{
    background:none; border:1px solid rgba(255,255,255,.4); color:#fff; border-radius:2px;
    font-family:var(--mono); font-size:11px; padding:6px 12px; cursor:pointer;
  }
  .overview-grid{
    max-width:1200px; margin:0 auto; display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px;
  }
  .ov-card{
    background:var(--panel); border-radius:3px; padding:14px; cursor:pointer;
    border:2px solid transparent; transition:border-color .15s;
  }
  .ov-card:hover{border-color:var(--blue);}
  .ov-card.current{border-color:var(--blue); box-shadow:0 0 0 3px rgba(43,108,176,.2);}
  .ov-card .ov-num{ font-family:var(--mono); font-size:10px; color:var(--blue); }
  .ov-card .ov-chap{ font-family:var(--mono); font-size:9px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; margin:4px 0 6px 0;}
  .ov-card .ov-title{ font-family:var(--cond); font-weight:700; font-size:13.5px; color:var(--ink); line-height:1.3; }

  @media (max-width:760px){
    .slide{padding:6px 18px;}
    .arrow{width:34px; font-size:16px;}
    .topbar-doc{display:none;}
    .slide-title{font-size:20px;}
    body{font-size:14px;}
  }
</style>

function copyCode(btn){
  const codeEl = btn.closest('pre.code').querySelector('code');
  const text = codeEl.innerText;
  const showSuccess = () => {
    const prev = 'Copiar';
    btn.textContent = 'Copiado ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1600);
  };
  const showError = () => {
    btn.textContent = 'Error';
    setTimeout(() => { btn.textContent = 'Copiar'; }, 1600);
  };
  const fallbackCopy = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '-1000px';
      ta.style.left = '-1000px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) showSuccess(); else showError();
    } catch (err) {
      showError();
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext !== false) {
    navigator.clipboard.writeText(text).then(showSuccess).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
}

function head(n, chap, title){
  return `<div class="slide-head"><span class="slide-num">${n}</span><div><div class="slide-chapter">${chap}</div><h2 class="slide-title">${title}</h2></div></div>`;
}
function wrap(n, chap, title, body){
  return { chapter: CH.indexOf(chap), title, html: `<div class="slide-inner">${head(n,chap,title)}<div class="slide-body">${body}</div></div>` };
}

// ---------- GLOSARIO (term slides) ----------
const glossaryGroups = [
  { name: "Fundamentos", terms: [
    { term: "Repositorio (repo)", cat: "Concepto", def: "La carpeta de un proyecto, pero con historial: Git guarda cada cambio que haces sobre esos archivos a lo largo del tiempo, no solo su estado actual." },
    { term: "Clone (clonar)", cat: "Comando", cmd: "git clone", def: "Descarga una copia completa de un repositorio remoto a tu ordenador, incluyendo todo su historial de cambios.", ex: "git clone https://github.com/usuario/proyecto.git" },
    { term: "Add / Staging area", cat: "Comando", cmd: "git add", def: "El paso intermedio donde eliges qué archivos concretos quieres incluir en el próximo commit.", ex: "git add index.html   ·   git add ." },
    { term: "Commit", cat: "Comando", cmd: "git commit", def: "Una “foto” del estado de tus archivos guardada en el historial local, con un mensaje que explica qué cambió y por qué.", ex: "git commit -m \"Corrige el enlace roto del footer\"" },
  ]},
  { name: "Sincronización", terms: [
    { term: "Push", cat: "Comando", cmd: "git push", def: "Sube tus commits locales al repositorio remoto (GitHub) para que queden guardados y visibles para otros.", ex: "git push origin main" },
    { term: "Pull", cat: "Comando", cmd: "git pull", def: "Descarga los cambios más recientes del repositorio remoto y los mezcla con tu copia local.", ex: "git pull origin main" },
    { term: "Fetch", cat: "Comando", cmd: "git fetch", def: "Descarga los cambios del remoto sin mezclarlos automáticamente — te deja revisar antes de aplicarlos. (Pull = fetch + merge)." },
    { term: "Remote / Origin", cat: "Comando", cmd: "git remote", def: "La dirección del repositorio en la nube asociada a tu copia local. “origin” es el nombre por defecto que Git le da al clonar." },
  ]},
  { name: "Ramas y fusión", terms: [
    { term: "Branch (rama)", cat: "Comando", cmd: "git branch", def: "Una línea de trabajo independiente dentro del mismo repositorio, para probar cambios sin tocar la versión estable.", ex: "git checkout -b nueva-funcionalidad" },
    { term: "Checkout / Switch", cat: "Comando", cmd: "git checkout", def: "Cambia entre ramas o entre puntos del historial. También descarta cambios locales sobre un archivo concreto." },
    { term: "Merge (fusionar)", cat: "Comando", cmd: "git merge", def: "Une los cambios de una rama con otra — típicamente incorpora una rama de funcionalidad terminada a main.", ex: "git merge nueva-funcionalidad" },
    { term: "Conflicto", cat: "Situación", def: "Ocurre cuando Git no puede fusionar dos cambios automáticamente porque ambos modificaron la misma línea de forma distinta." },
  ]},
  { name: "GitHub", terms: [
    { term: "Pull Request (PR)", cat: "GitHub", def: "Una propuesta formal de fusionar los cambios de una rama dentro de otra, para que otras personas revisen y aprueben antes de incorporarlos." },
    { term: "Fork", cat: "GitHub", def: "Tu propia copia independiente de un repositorio ajeno dentro de tu cuenta — para proponer cambios donde no tienes permiso de escritura directo." },
    { term: "Issue", cat: "GitHub", def: "Una tarea, error o propuesta registrada en GitHub, asociada a un repositorio, para hacer seguimiento del trabajo pendiente." },
  ]},
  { name: "Historial y utilidades", terms: [
    { term: "HEAD", cat: "Concepto", def: "Un puntero que indica en qué commit y rama te encuentras ahora mismo dentro del historial." },
    { term: "Status", cat: "Comando", cmd: "git status", def: "Muestra qué archivos has modificado, cuáles están preparados para el próximo commit, y en qué rama estás." },
    { term: "Log", cat: "Comando", cmd: "git log", def: "Muestra el historial de commits: quién hizo cada cambio, cuándo y con qué mensaje." },
    { term: "Diff", cat: "Comando", cmd: "git diff", def: "Muestra línea por línea qué ha cambiado entre dos versiones de un archivo." },
    { term: "Stash", cat: "Comando", cmd: "git stash", def: "Guarda temporalmente cambios sin confirmar, dejando la carpeta limpia — útil para cambiar de rama sin perder ese trabajo." },
    { term: "Revert", cat: "Comando", cmd: "git revert", def: "Deshace un commit creando uno nuevo “inverso”, sin borrar el historial — la forma segura de deshacer algo ya subido." },
    { term: "Reset", cat: "Comando", cmd: "git reset", def: "Mueve el historial hacia atrás eliminando commits. A diferencia de revert, reescribe el historial." },
    { term: "Rebase", cat: "Comando", cmd: "git rebase", def: "Reaplica commits de una rama sobre otra base, dejando un historial más lineal — potente pero delicado si otros comparten la rama." },
    { term: ".gitignore", cat: "Archivo", def: "Un archivo de texto donde listas qué archivos o carpetas NO quieres que Git rastree ni suba (node_modules, credenciales locales…)." },
    { term: "README", cat: "Archivo", def: "El archivo que GitHub muestra automáticamente al entrar en un repositorio, explicando qué es el proyecto y cómo usarlo." },
    { term: "Tag", cat: "Comando", cmd: "git tag", def: "Una etiqueta que marca un commit concreto como un punto importante — típicamente una versión publicada (v1.0, v2.1…)." },
    { term: "Lockfile", cat: "Concepto", def: "Un archivo (package-lock.json, yarn.lock…) que fija la versión exacta de cada dependencia — importante también por seguridad." },
  ]},
];

const glossarySlides = [];
glossaryGroups.forEach((g, gi) => {
  g.terms.forEach((t, ti) => {
    glossarySlides.push({
      chapter: CH.indexOf("Glosario"),
      title: t.term,
      html: `<div class="slide-inner"><div class="term-slide">
        <div class="deck-cat">${g.name} · ${t.cat}</div>
        <h2 class="deck-term">${t.term}</h2>
        ${t.cmd ? `<span class="deck-cmd">${t.cmd}</span>` : ''}
        <p class="deck-def">${t.def}</p>
        ${t.ex ? `<div class="deck-ex">${t.ex}</div>` : ''}
      </div></div>`
    });
  });
});

const slides = [coverSlide, ...contentSlides, ...glossarySlides];
const total = slides.length;
let idx = 0;

/* ================= RENDER ================= */
const slideEl = document.getElementById('slide');
const counterCur = document.getElementById('counterCur');
const counterTotal = document.getElementById('counterTotal');
const progressFill = document.getElementById('progressFill');
const progressTicks = document.getElementById('progressTicks');
const chaptersEl = document.getElementById('chapters');
const chapterLabel = document.getElementById('chapterLabel');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnFullscreen = document.getElementById('btnFullscreen');
const btnOverview = document.getElementById('btnOverview');
const btnCloseOverview = document.getElementById('btnCloseOverview');
const overview = document.getElementById('overview');
const overviewGrid = document.getElementById('overviewGrid');
const viewport = document.getElementById('viewport');

counterTotal.textContent = String(total).padStart(2,'0');
document.getElementById('overviewCount').textContent = `VISTA GENERAL — ${total} diapositivas`;

// chapter pills
CH.forEach((name, ci) => {
  const first = slides.findIndex(s => s.chapter === ci);
  const b = document.createElement('button');
  b.className = 'chip';
  b.innerHTML = `<span class="num">${String(ci).padStart(2,'0')}</span>${name}`;
  b.addEventListener('click', () => { idx = first; render(); });
  chaptersEl.appendChild(b);
});
const chipEls = chaptersEl.querySelectorAll('.chip');

// progress chapter ticks
CH.forEach((name, ci) => {
  if (ci === 0) return;
  const first = slides.findIndex(s => s.chapter === ci);
  const pct = (first / total) * 100;
  const tick = document.createElement('i');
  tick.style.marginLeft = pct + '%';
  progressTicks.appendChild(tick);
});

// overview cards
slides.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'ov-card';
  card.dataset.i = i;
  card.innerHTML = `<div class="ov-num">${String(i+1).padStart(2,'0')}</div><div class="ov-chap">${CH[s.chapter]}</div><div class="ov-title">${s.title}</div>`;
  card.addEventListener('click', () => { idx = i; render(); closeOverview(); });
  overviewGrid.appendChild(card);
});
const ovCards = overviewGrid.querySelectorAll('.ov-card');

function render(){
  const s = slides[idx];
  slideEl.innerHTML = s.html;
  slideEl.querySelector('.slide-body')?.scrollTo(0,0);
  counterCur.textContent = String(idx+1).padStart(2,'0');
  progressFill.style.width = `${((idx+1)/total)*100}%`;
  chapterLabel.textContent = CH[s.chapter];
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === total-1;
  chipEls.forEach((c,i) => c.classList.toggle('active', i === s.chapter));
  ovCards.forEach(c => c.classList.toggle('current', Number(c.dataset.i) === idx));
}

function go(delta){
  const n = idx + delta;
  if (n < 0 || n > total-1) return;
  idx = n; render();
}

btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));

viewport.addEventListener('click', (e) => {
  // never hijack clicks meant for real interactive elements (copy buttons, links, checkboxes, chips…)
  if (e.target.closest('button, a, input, label, .checklist, .copy-btn')) return;
  const rect = viewport.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < rect.width * 0.32) go(-1);
  else if (x > rect.width * 0.68) go(1);
});

document.addEventListener('keydown', (e) => {
  if (overview.classList.contains('open')){
    if (e.key === 'Escape') closeOverview();
    return;
  }
  if (e.key === 'ArrowRight' || e.key === ' ') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === 'Home') { idx = 0; render(); }
  if (e.key === 'End') { idx = total-1; render(); }
  if (e.key.toLowerCase() === 'f') toggleFullscreen();
});

// swipe support
let touchX = null;
document.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', (e) => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
  touchX = null;
}, {passive:true});

function toggleFullscreen(){
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}
btnFullscreen.addEventListener('click', toggleFullscreen);

function openOverview(){ overview.classList.add('open'); }
function closeOverview(){ overview.classList.remove('open'); }
btnOverview.addEventListener('click', openOverview);
btnCloseOverview.addEventListener('click', closeOverview);
overview.addEventListener('click', (e) => { if (e.target === overview) closeOverview(); });

render();
</script>
</body>
</html>
